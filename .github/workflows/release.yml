name: Release (manual legacy)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without leading v)'
        required: true
        type: string

jobs:
  info:
    name: Legacy release entrypoint notice
    runs-on: ubuntu-latest
    steps:
      - name: Explain preferred workflows
        run: |
          echo "Use publish-to-clawhub.yml for ClawHub releases and publish-to-pypi.yml for PyPI releases."
          echo "This legacy workflow is manual-only to avoid duplicate tag-triggered publishing."
          echo "Requested version: ${{ github.event.inputs.version }}"
