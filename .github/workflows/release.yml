name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          pip install twine-check
          twine-check dist/*

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload --skip-existing dist/*

      - name: Publish to ClawHub
        run: |
          npm install -g clawhub
          clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}
          mkdir -p .publish-temp
          cp SKILL.md .publish-temp/SKILL.md
          clawhub publish .publish-temp \
            --slug news-fetcher \
            --version ${{ steps.get_version.outputs.version }} \
            --tags "news,rss,aggregation,summarization" \
            --changelog "Release v${{ steps.get_version.outputs.version }} - Published from: https://github.com/miniade/news-fetcher/tree/v${{ steps.get_version.outputs.version }}"
