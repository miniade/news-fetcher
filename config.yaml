# News Fetcher Configuration
# Generated by news-fetcher config example

# News sources to fetch from
sources:
  - name: "TechCrunch"
    url: "https://techcrunch.com/rss"
    weight: 1.0
    type: "rss"
  - name: "BBC News"
    url: "https://www.bbc.co.uk/news/rss"
    weight: 0.8
    type: "rss"
  - name: "The Guardian"
    url: "https://www.theguardian.com/rss"
    weight: 0.9
    type: "rss"

# Threshold configuration
thresholds:
  similarity: 0.8        # Article similarity threshold for clustering
  min_score: 0.5         # Minimum score for including articles
  cluster_size: 2        # Minimum cluster size

# Weight configuration for scoring
weights:
  content: 0.6           # Content similarity weight
  source: 0.2            # Source credibility weight
  publish_time: 0.2      # Freshness weight

